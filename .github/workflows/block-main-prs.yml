name: Allow only develop/hotfix -> main

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          if [[ "${{ github.head_ref }}" != "develop" && "${{ github.head_ref }}" != hotfix/*  ]]; then
            echo "Only develop or hotfix can be merged into main"
            exit 1
          fi
